<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in | Auth Module</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --page-bg: #f5f8fc;
        --brand-blue: #1d4ed8;
        --brand-blue-dark: #1e3a8a;
        --muted-border: #dbe5f1;
      }

      body {
        min-height: 100vh;
        background: var(--page-bg);
        color: #172033;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
      }

      .login-shell {
        min-height: 100vh;
        padding: 32px 16px;
      }

      .login-card {
        width: 100%;
        max-width: 460px;
        border: 1px solid var(--muted-border);
        border-radius: 8px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
      }

      .form-control {
        min-height: 46px;
        border-color: var(--muted-border);
      }

      .form-control:focus {
        border-color: var(--brand-blue);
        box-shadow: 0 0 0 0.2rem rgba(29, 78, 216, 0.12);
      }

      .btn-primary {
        --bs-btn-bg: var(--brand-blue);
        --bs-btn-border-color: var(--brand-blue);
        --bs-btn-hover-bg: var(--brand-blue-dark);
        --bs-btn-hover-border-color: var(--brand-blue-dark);
        min-height: 46px;
      }

      .small-text {
        color: #667085;
        font-size: 0.92rem;
      }

      @media (max-width: 420px) {
        .login-card {
          padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="login-shell d-flex align-items-center justify-content-center">
      <section class="login-card bg-white p-4 p-sm-5">
        <div class="mb-4">
          <h1 class="h3 fw-semibold mb-2">Sign in to your account</h1>
          <p class="small-text mb-0">
            Enter your email and password to access your account.
          </p>
        </div>

        <div
          id="message"
          class="alert d-none"
          role="alert"
          aria-live="polite"
        ></div>

        <form id="loginForm" class="d-grid gap-3">
          <div>
            <label for="email" class="form-label fw-medium"
              >Email address</label
            >
            <input
              id="email"
              name="email"
              type="email"
              class="form-control"
              autocomplete="email"
              required
            />
            <div id="emailError" class="invalid-feedback"></div>
          </div>
          <div>
            <label for="password" class="form-label fw-medium">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              class="form-control"
              autocomplete="current-password"
              required
            />
            <div id="passwordError" class="invalid-feedback"></div>
          </div>
          <button
            id="loginButton"
            type="submit"
            class="btn btn-primary fw-medium"
          >
            Sign in
          </button>
        </form>

        <p class="small-text mt-4 mb-0">
          Don’t have an account? <a href="/register/">Create one</a>
        </p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const loginForm = document.getElementById("loginForm");
      const messageBox = document.getElementById("message");
      const loginButton = document.getElementById("loginButton");
      const fieldErrors = {
        email: document.getElementById("emailError"),
        password: document.getElementById("passwordError"),
      };

      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) {
          return parts.pop().split(";").shift();
        }
        return "";
      }

      function showMessage(text, type) {
        messageBox.textContent = text;
        messageBox.className = `alert alert-${type}`;
      }

      function clearErrors() {
        Object.entries(fieldErrors).forEach(([field, element]) => {
          const input = document.getElementById(field);
          if (input) {
            input.classList.remove("is-invalid");
          }
          element.textContent = "";
        });
      }

      function showFieldErrors(errors) {
        Object.entries(errors).forEach(([field, messages]) => {
          const input = document.getElementById(field);
          if (input) {
            input.classList.add("is-invalid");
          }
          if (fieldErrors[field]) {
            fieldErrors[field].textContent = Array.isArray(messages)
              ? messages.join(" ")
              : messages;
          }
        });
      }

      async function parseResponse(response) {
        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json")) {
          return response.json();
        }
        return { detail: "Unexpected server response. Please try again." };
      }

      function getErrorMessage(data) {
        if (data.detail) {
          return data.detail;
        }
        if (data.non_field_errors) {
          return data.non_field_errors.join(" ");
        }
        return "Please correct the highlighted fields.";
      }

      async function postJson(url, payload) {
        const response = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie("csrftoken"),
          },
          body: JSON.stringify(payload),
        });
        const data = await parseResponse(response);
        if (!response.ok) {
          const error = new Error(getErrorMessage(data));
          error.errors = data;
          throw error;
        }
        return data;
      }

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        clearErrors();
        loginButton.disabled = true;
        loginButton.textContent = "Signing in...";

        try {
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          await postJson("/api/login/", { email, password });

          window.location.href = "/profile/";
        } catch (error) {
          showFieldErrors(error.errors || {});
          showMessage(error.message, "danger");
        } finally {
          loginButton.disabled = false;
          loginButton.textContent = "Sign in";
        }
      });
    </script>
  </body>
</html>
