<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile | Auth Module</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --page-bg: #f5f8fc;
        --brand-blue: #1d4ed8;
        --brand-blue-dark: #1e3a8a;
        --muted-border: #dbe5f1;
      }

      body {
        min-height: 100vh;
        background: var(--page-bg);
        color: #172033;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
      }

      .profile-shell {
        min-height: 75vh;
        padding: 24px 16px 24px;
        background: var(--page-bg);
      }

      .profile-card {
        width: 100%;
        max-width: 760px;
        border: 1px solid var(--muted-border);
        border-radius: 8px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
      }

      .profile-header {
        border-bottom: 1px solid var(--muted-border);
      }

      .form-label {
        font-weight: 600;
      }

      .profile-nav {
        box-shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
        border-bottom: 1px solid rgba(223, 227, 235, 0.8);
      }

      .btn-primary {
        --bs-btn-bg: var(--brand-blue);
        --bs-btn-border-color: var(--brand-blue);
        --bs-btn-hover-bg: var(--brand-blue-dark);
        --bs-btn-hover-border-color: var(--brand-blue-dark);
        min-height: 46px;
      }

      .small-text {
        color: #667085;
        font-size: 0.92rem;
      }

      .profile-badge {
        background: rgba(29, 78, 216, 0.08);
        color: var(--brand-blue-dark);
      }

      @media (max-width: 576px) {
        .profile-card {
          padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-sm navbar-light bg-white profile-nav">
      <div class="container-fluid px-4">
        <a class="navbar-brand fw-semibold" href="/">Auth Module</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center gap-2">
            <li class="nav-item">
              <span
                id="userIndicator"
                class="badge rounded-pill profile-badge py-2 px-3"
                >Loading user...</span
              >
            </li>
            <li class="nav-item">
              <button
                id="logoutButton"
                class="btn btn-outline-secondary"
                type="button"
              >
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="profile-shell d-flex justify-content-center">
      <section class="profile-card bg-white p-4 p-sm-5 mt-4">
        <div class="profile-header mb-4">
          <h1 class="h4 fw-semibold mb-1">Your profile</h1>
        </div>

        <div
          id="message"
          class="alert d-none"
          role="alert"
          aria-live="polite"
        ></div>

        <div id="profileContent" class="d-grid gap-3">
          <div class="row gx-3">
            <div class="col-12 col-md-6">
              <label class="form-label mb-1">Email</label>
              <div id="userEmail" class="form-control-plaintext">—</div>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label mb-1">Username</label>
              <div id="userUsername" class="form-control-plaintext">—</div>
            </div>
          </div>

          <div class="row gx-3">
            <div class="col-12 col-md-6">
              <label class="form-label mb-1">Account status</label>
              <div class="badge rounded-pill bg-success text-white py-2 px-3">
                Active
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const messageBox = document.getElementById("message");
      const userIndicator = document.getElementById("userIndicator");
      const profileContent = document.getElementById("profileContent");

      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) {
          return parts.pop().split(";").shift();
        }
        return "";
      }

      function showMessage(text, type) {
        messageBox.textContent = text;
        messageBox.className = `alert alert-${type}`;
      }

      function parseResponse(response) {
        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json")) {
          return response.json();
        }
        return Promise.resolve({ detail: "Unexpected server response." });
      }

      const logoutButton = document.getElementById("logoutButton");

      async function loadProfile() {
        try {
          const response = await fetch("/api/me/");
          const data = await parseResponse(response);
          if (!response.ok) {
            throw new Error(data.detail || "Unable to load profile.");
          }

          document.getElementById("userEmail").textContent = data.email;
          document.getElementById("userUsername").textContent = data.username;
          userIndicator.textContent = `Signed in as ${data.email}`;
          profileContent.classList.remove("d-none");
        } catch (error) {
          showMessage(error.message, "danger");
          userIndicator.textContent = "Not signed in";
          profileContent.classList.add("d-none");
        }
      }

      async function postJson(url, payload = {}) {
        const response = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie("csrftoken"),
          },
          body: JSON.stringify(payload),
        });
        const data = await parseResponse(response);
        if (!response.ok) {
          const error = new Error(data.detail || "Request failed.");
          error.errors = data;
          throw error;
        }
        return data;
      }

      logoutButton.addEventListener("click", async () => {
        logoutButton.disabled = true;
        logoutButton.textContent = "Logging out...";
        try {
          await postJson("/api/logout/");
          window.location.href = "/login/";
        } catch (error) {
          logoutButton.disabled = false;
          logoutButton.textContent = "Logout";
          showMessage(error.message, "danger");
        }
      });

      loadProfile();
    </script>
  </body>
</html>
