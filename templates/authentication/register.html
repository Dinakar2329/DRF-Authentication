<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create account | Auth Module</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --page-bg: #f5f8fc;
            --brand-blue: #1d4ed8;
            --brand-blue-dark: #1e3a8a;
            --muted-border: #dbe5f1;
        }

        body {
            min-height: 100vh;
            background: var(--page-bg);
            color: #172033;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        }

        .register-shell {
            min-height: 100vh;
            padding: 32px 16px;
        }

        .register-card {
            width: 100%;
            max-width: 460px;
            border: 1px solid var(--muted-border);
            border-radius: 8px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
        }

        .form-control {
            min-height: 46px;
            border-color: var(--muted-border);
        }

        .form-control:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 0.2rem rgba(29, 78, 216, 0.12);
        }

        .btn-primary {
            --bs-btn-bg: var(--brand-blue);
            --bs-btn-border-color: var(--brand-blue);
            --bs-btn-hover-bg: var(--brand-blue-dark);
            --bs-btn-hover-border-color: var(--brand-blue-dark);
            min-height: 46px;
        }

        .small-text {
            color: #667085;
            font-size: 0.92rem;
        }

        .otp-input {
            width: 48px;
            height: 52px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
        }

        @media (max-width: 420px) {
            .otp-input {
                width: 42px;
                height: 48px;
            }
        }
    </style>
</head>
<body>
    <main class="register-shell d-flex align-items-center justify-content-center">
        <section class="register-card bg-white p-4 p-sm-5">
            <div class="mb-4">
                <h1 class="h3 fw-semibold mb-2">Create your account</h1>
                <p class="small-text mb-0">Enter your email and password. We will send a one-time code to verify your account.</p>
            </div>

            <div id="message" class="alert d-none" role="alert" aria-live="polite"></div>

            <form id="registerForm" class="d-grid gap-3">
                <div>
                    <label for="email" class="form-label fw-medium">Email address</label>
                    <input id="email" name="email" type="email" class="form-control" autocomplete="email" required>
                    <div id="emailError" class="invalid-feedback"></div>
                </div>
                <div>
                    <label for="password" class="form-label fw-medium">Password</label>
                    <input id="password" name="password" type="password" class="form-control" autocomplete="new-password" minlength="8" required>
                    <div id="passwordError" class="invalid-feedback"></div>
                    <div class="form-text">Use at least 8 characters.</div>
                </div>
                <button id="registerButton" type="submit" class="btn btn-primary fw-medium">Send verification code</button>
            </form>

            <p id="otpHint" class="small-text mt-4 mb-0 d-none">Verification code sent. Check your email or the server console.</p>
        </section>
    </main>

    <div class="modal fade" id="otpModal" tabindex="-1" aria-labelledby="otpModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-2">
                <div class="modal-header border-0 pb-0">
                    <div>
                        <h2 class="modal-title h5 fw-semibold" id="otpModalLabel">Verify your email</h2>
                        <p class="small-text mb-0">Enter the 6-digit code we sent to your email.</p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="verifyForm">
                    <div class="modal-body pt-4">
                        <div id="modalMessage" class="alert d-none" role="alert" aria-live="polite"></div>
                        <div class="d-flex justify-content-between gap-2 mb-2" id="otpInputs">
                            <input class="form-control otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 1" required>
                            <input class="form-control otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 2" required>
                            <input class="form-control otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 3" required>
                            <input class="form-control otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 4" required>
                            <input class="form-control otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 5" required>
                            <input class="form-control otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="OTP digit 6" required>
                        </div>
                        <div id="otpError" class="invalid-feedback d-block"></div>
                    </div>
                    <div class="modal-footer border-0 pt-0">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button id="verifyButton" type="submit" class="btn btn-primary fw-medium px-4">Verify account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const registerForm = document.getElementById('registerForm');
        const verifyForm = document.getElementById('verifyForm');
        const messageBox = document.getElementById('message');
        const modalMessageBox = document.getElementById('modalMessage');
        const registerButton = document.getElementById('registerButton');
        const verifyButton = document.getElementById('verifyButton');
        const otpHint = document.getElementById('otpHint');
        const otpInputs = Array.from(document.querySelectorAll('.otp-input'));
        const otpModal = new bootstrap.Modal(document.getElementById('otpModal'));
        const fieldErrors = {
            email: document.getElementById('emailError'),
            password: document.getElementById('passwordError'),
            otp: document.getElementById('otpError'),
        };

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) {
                return parts.pop().split(';').shift();
            }
            return '';
        }

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = `alert alert-${type}`;
        }

        function showModalMessage(text, type) {
            modalMessageBox.textContent = text;
            modalMessageBox.className = `alert alert-${type}`;
        }

        function clearModalMessage() {
            modalMessageBox.textContent = '';
            modalMessageBox.className = 'alert d-none';
        }

        function clearErrors() {
            Object.entries(fieldErrors).forEach(([field, element]) => {
                const input = document.getElementById(field);
                if (input) {
                    input.classList.remove('is-invalid');
                }
                element.textContent = '';
            });
            otpInputs.forEach((input) => input.classList.remove('is-invalid'));
        }

        function showFieldErrors(errors) {
            Object.entries(errors).forEach(([field, messages]) => {
                if (!fieldErrors[field]) {
                    return;
                }
                const input = document.getElementById(field);
                if (input) {
                    input.classList.add('is-invalid');
                }
                if (field === 'otp') {
                    otpInputs.forEach((otpInput) => otpInput.classList.add('is-invalid'));
                }
                fieldErrors[field].textContent = Array.isArray(messages) ? messages.join(' ') : messages;
            });
        }

        async function parseResponse(response) {
            const contentType = response.headers.get('content-type') || '';
            if (contentType.includes('application/json')) {
                return response.json();
            }
            return { detail: 'Unexpected server response. Please try again.' };
        }

        function getErrorMessage(data) {
            if (data.detail) {
                return data.detail;
            }
            if (data.non_field_errors) {
                return data.non_field_errors.join(' ');
            }
            return 'Please correct the highlighted fields.';
        }

        async function postJson(url, payload) {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: JSON.stringify(payload),
            });
            const data = await parseResponse(response);
            if (!response.ok) {
                const error = new Error(getErrorMessage(data));
                error.errors = data;
                throw error;
            }
            return data;
        }

        function getOtpValue() {
            return otpInputs.map((input) => input.value).join('');
        }

        function clearOtpInputs() {
            otpInputs.forEach((input) => {
                input.value = '';
            });
        }

        otpInputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                input.value = input.value.replace(/\D/g, '').slice(0, 1);
                if (input.value && otpInputs[index + 1]) {
                    otpInputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (event) => {
                if (event.key === 'Backspace' && !input.value && otpInputs[index - 1]) {
                    otpInputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', (event) => {
                event.preventDefault();
                const pasted = event.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
                pasted.split('').forEach((digit, digitIndex) => {
                    otpInputs[digitIndex].value = digit;
                });
                const nextIndex = Math.min(pasted.length, otpInputs.length - 1);
                otpInputs[nextIndex].focus();
            });
        });

        registerForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            clearErrors();
            registerButton.disabled = true;
            registerButton.textContent = 'Sending...';

            try {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const data = await postJson('/api/register/', { email, password });

                showMessage(data.message, 'success');
                otpHint.classList.remove('d-none');
                clearOtpInputs();
                clearModalMessage();
                otpModal.show();
                setTimeout(() => otpInputs[0].focus(), 250);
            } catch (error) {
                showFieldErrors(error.errors || {});
                showMessage(error.message, 'danger');
            } finally {
                registerButton.disabled = false;
                registerButton.textContent = 'Send verification code';
            }
        });

        verifyForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            clearErrors();
            clearModalMessage();
            verifyButton.disabled = true;
            verifyButton.textContent = 'Verifying...';

            try {
                const email = document.getElementById('email').value.trim();
                const otp = getOtpValue();
                const data = await postJson('/api/register/verify/', { email, otp });

                showMessage(data.message, 'success');
                otpModal.hide();
                otpHint.classList.add('d-none');
                clearOtpInputs();
                registerForm.reset();
            } catch (error) {
                showFieldErrors(error.errors || {});
                showModalMessage(error.message, 'danger');
            } finally {
                verifyButton.disabled = false;
                verifyButton.textContent = 'Verify account';
            }
        });
    </script>
</body>
</html>
